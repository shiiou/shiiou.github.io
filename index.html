<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<link rel="icon" type="image/x-icon" href="./favicon.png"/>

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ꜱʜɪɪᴏᴜ 🍜</title>
<meta name="description" content="✦ 사진작가 ✦"/>
<meta property="og:title" content="ꜱʜɪɪᴏᴜ 🍜"/>
<meta property="og:description" content="✦ ʙᴀᴅ ᴘʜᴏᴛᴏɢʀᴀᴘʜᴇʀ ✦"/>
<meta name="theme-color" content="#e6262b"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --red: #e6262b;
  --red2: #ff4d4d;
  --red3: #f5f5f5;
  --gold: #cc2026;
  --gold2: #f5f5f5;
  --dark: #050505;
  --dark2: #0c0c0c;
  --dark3: #161616;
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--dark);
  color: var(--gold2);
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

#bg {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse at 50% 0%, #1a0707 0%, #0c0c0c 40%, #050505 100%);
}
#bg::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(230,38,43,0.04) 60px, rgba(230,38,43,0.04) 61px),
    repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(230,38,43,0.04) 60px, rgba(230,38,43,0.04) 61px);
}
#particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

#sharingan-bg {
  position: fixed;
  width: 700px; height: 700px;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 1;
  opacity: 0.04;
  animation: rotateSlow 60s linear infinite;
}
@keyframes rotateSlow { to { transform: translate(-50%,-50%) rotate(360deg); } }

#wrap {
  position: relative; z-index: 10;
  max-width: 480px;
  margin: 0 auto;
  padding: 40px 20px 60px;
  display: flex; flex-direction: column; align-items: center;
  gap: 0;
}

.avatar-ring {
  position: relative;
  width: 110px; height: 110px;
  margin-bottom: 18px;
}
.avatar-ring svg.ring {
  position: absolute; inset: -8px;
  width: calc(100% + 16px); height: calc(100% + 16px);
  animation: rotateRing 8s linear infinite;
}
@keyframes rotateRing { to { transform: rotate(360deg); } }
.avatar-inner {
  width: 110px; height: 110px;
  border-radius: 50%;
  background: #0c0c0c;
  border: 2px solid var(--red);
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 20px #e6262b44, 0 0 60px #e6262b22;
}
.avatar-inner svg { width: 70px; height: 70px; }

.username {
  font-family: 'Noto Serif JP', serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--gold2);
  letter-spacing: 6px;
  text-align: center;
  text-shadow: 0 0 20px #e6262b66;
  margin-bottom: 6px;
}
.uid {
  font-size: 11px;
  color: #888888;
  letter-spacing: 3px;
  margin-bottom: 8px;
}
.bio {
  font-size: 13px;
  color: var(--gold);
  letter-spacing: 2px;
  text-align: center;
  margin-bottom: 6px;
  font-family: 'Noto Serif JP', serif;
  font-weight: 300;
}
.kanji-row {
  display: flex; gap: 14px;
  font-family: 'Noto Serif JP', serif;
  font-size: 18px;
  color: var(--red);
  margin-bottom: 22px;
  opacity: 0.7;
}

.divider {
  width: 100%;
  display: flex; align-items: center; gap: 10px;
  margin: 4px 0 20px;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--red), transparent);
}
.divider-icon { color: var(--red); font-size: 14px; }

.stats {
  display: flex; gap: 24px;
  margin-bottom: 24px;
}
.stat {
  text-align: center;
  background: rgba(230,38,43,0.06);
  border: 1px solid rgba(230,38,43,0.18);
  border-radius: 6px;
  padding: 8px 18px;
}
.stat-n { font-size: 20px; font-weight: 700; color: var(--gold2); }
.stat-l { font-size: 9px; color: #888888; letter-spacing: 2px; text-transform: uppercase; }

.links { width: 100%; display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }

.link-btn {
  display: flex; align-items: center; gap: 14px;
  padding: 13px 18px;
  background: rgba(10,10,22,0.8);
  border: 1px solid rgba(230,38,43,0.2);
  border-radius: 8px;
  color: var(--gold2);
  text-decoration: none;
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 1px;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
  cursor: pointer;
}
.link-btn::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--red);
  opacity: 0;
  transition: opacity 0.25s;
}
.link-btn:hover {
  background: rgba(230,38,43,0.12);
  border-color: rgba(255,77,77,0.5);
  transform: translateX(4px);
  box-shadow: 0 0 15px #e6262b22;
}
.link-btn:hover::before { opacity: 1; }
.link-icon {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.link-icon svg { width: 20px; height: 20px; }
.link-text { flex: 1; }
.link-name { display: block; font-size: 13px; font-weight: 700; color: var(--gold2); }
.link-sub { display: block; font-size: 10px; color: #888888; letter-spacing: 1px; }
.link-arrow { color: #3a3a3a; font-size: 16px; transition: color 0.25s; }
.link-btn:hover .link-arrow { color: var(--red); }

.section-title {
  width: 100%;
  font-family: 'Noto Serif JP', serif;
  font-size: 11px;
  color: var(--red);
  letter-spacing: 5px;
  text-transform: uppercase;
  margin-bottom: 12px;
  text-align: center;
}
.gallery {
  width: 100%;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-bottom: 24px;
}
.banner-card {
  grid-column: span 2;
  aspect-ratio: 3/1 !important;
}
.gallery-card {
  aspect-ratio: 1/1;
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid rgba(230,38,43,0.2);
  position: relative;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.2s;
}
.gallery-card:hover {
  border-color: var(--red);
  transform: scale(1.02);
}
.gallery-card img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  filter: brightness(0.85);
  transition: filter 0.2s;
}
.gallery-card:hover img { filter: brightness(1); }
.gallery-card .card-label {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(7,7,15,0.92));
  padding: 20px 10px 8px;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--gold);
  text-align: center;
}

#modal {
  display: none;
  position: fixed; inset: 0; z-index: 100;
  background: rgba(7,7,15,0.95);
  align-items: center; justify-content: center;
  padding: 20px;
}
#modal.open { display: flex; }
#modal-inner {
  position: relative;
  max-width: 600px; width: 100%;
  border: 1px solid var(--red);
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 0 40px #e6262b33;
}
#modal-inner img { width: 100%; display: block; }
#modal-close {
  position: absolute; top: 10px; right: 14px;
  color: var(--gold2); font-size: 24px;
  cursor: pointer; background: none; border: none;
  text-shadow: 0 0 10px #e6262b;
}
#modal-caption {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(7,7,15,0.96));
  padding: 30px 16px 14px;
  font-family: 'Noto Serif JP', serif;
  font-size: 12px; letter-spacing: 2px; color: var(--gold);
  text-align: center;
}

/* ---- FOOTER ---- */
.footer {
  font-size: 9px; color: #3a1010;
  letter-spacing: 3px;
  text-align: center;
  margin-top: 10px;
  font-family: 'Noto Serif JP', serif;
}

.song-bar {
  width: 100%;
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px;
  background: rgba(10,10,22,0.8);
  border: 1px solid rgba(230,38,43,0.18);
  border-radius: 8px;
  margin-bottom: 20px;
  cursor: pointer;
  transition: border-color 0.2s;
}
.song-bar:hover { border-color: rgba(230,38,43,0.4); }
.song-icon { color: var(--red); font-size: 20px; flex-shrink: 0; width: 22px; text-align: center; }
.song-info { flex: 1; min-width: 0; }
.song-title { font-size: 12px; font-weight: 700; color: var(--gold2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.song-artist { font-size: 10px; color: #888888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.song-bars { display: flex; align-items: flex-end; gap: 2px; height: 20px; flex-shrink: 0; }
.song-bars span {
  width: 3px; background: var(--red);
  border-radius: 1px;
  animation: bar 0.8s ease-in-out infinite alternate;
  animation-play-state: paused;
  height: 4px;
}
.song-bar.playing .song-bars span { animation-play-state: running; }
.song-bars span:nth-child(2) { animation-delay: 0.15s; }
.song-bars span:nth-child(3) { animation-delay: 0.3s; }
.song-bars span:nth-child(4) { animation-delay: 0.1s; }
.song-bars span:nth-child(5) { animation-delay: 0.25s; }
@keyframes bar { from { height: 4px; } to { height: 18px; } }
.song-vol {
  flex-shrink: 0; width: 50px; accent-color: var(--red);
  cursor: pointer;
}

.discord-card {
  width: 100%;
  display: flex; flex-direction: column;
  background: rgba(10,10,22,0.8);
  border: 1px solid rgba(230,38,43,0.18);
  border-radius: 8px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}
.discord-banner {
  width: 100%;
  height: 130px;
  position: relative;
  overflow: hidden;
  background: linear-gradient(120deg, #1a0707 0%, #3a0a0a 50%, #0c0c0c 100%);
}
.discord-banner img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.discord-card-body {
  display: flex; flex-direction: column; gap: 4px;
  padding: 12px 16px 16px;
  position: relative;
}
.discord-card-body::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 0px;
  background: #e6262b2e;
  transition: background 0.4s;
}
.discord-avatar-wrap {
  position: relative; flex-shrink: 0;
  margin-top: -32px;
  margin-bottom: 6px;
}
.discord-avatar {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: #0c0c0c;
  border: 3px solid #050505;
  object-fit: cover;
  display: block;
}
.discord-info { width: 100%; min-width: 0; }
.discord-name { font-size: 15px; font-weight: 700; color: var(--gold2); }
.discord-status-text {
  position: absolute; bottom: -4px; right: -8px;
  font-size: large;
  font-weight: 700;
  color: var(--gold2);
  letter-spacing: 0.3px;
  white-space: nowrap;
  background: #050505;
  border: 2px solid #050505;
  border-radius: 8px;
  padding: 1px 5px;
  line-height: 1.4;
}
.discord-activity { font-size: 14px; font-weight: 600; color: var(--red); letter-spacing: 0.5px; margin-top: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 8px; }
.discord-activity img { width: 48px; height: 48px; border-radius: 6px; flex-shrink: 0; }

.typing::after {
  content: '|';
  animation: blink 1s infinite;
  color: var(--red);
}
@keyframes blink { 50% { opacity: 0; } }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-up { animation: fadeUp 0.6s ease forwards; opacity: 0; }
.d1 { animation-delay: 0.1s; }
.d2 { animation-delay: 0.25s; }
.d3 { animation-delay: 0.4s; }
.d4 { animation-delay: 0.55s; }
.d5 { animation-delay: 0.7s; }
.d6 { animation-delay: 0.85s; }
.d7 { animation-delay: 1.0s; }

@media (max-width: 400px) {
  .username { font-size: 22px; }
  .stats { gap: 12px; }
  .stat { padding: 6px 12px; }
}
</style>
</head>

  <script>
  (function() {
    const GUILD_ID = '1330207904200134749';
    async function loadWidget() {
      try {
        const res = await fetch(`https://discord.com/api/guilds/${GUILD_ID}/widget.json`);
        const data = await res.json();
        document.getElementById('dw-name').textContent = data.name || "Shiiou's";
        document.getElementById('dw-count').textContent = data.presence_count || data.members?.length || 0;
        if (data.instant_invite) {
          document.getElementById('dw-invite').href = data.instant_invite;
        }
        const membersEl = document.getElementById('dw-members');
        const members = data.members || [];
        if (members.length === 0) {
          membersEl.innerHTML = '<div class="dw-loading">Aucun membre en ligne</div>';
          return;
        }
        const order = { online: 0, idle: 1, dnd: 2 };
        members.sort((a, b) => (order[a.status] ?? 3) - (order[b.status] ?? 3));
        membersEl.innerHTML = members.map(m => `
          <div class="dw-member" title="${m.username}${m.game ? ' • ' + m.game.name : ''}">
            <div class="dw-avatar-wrap">
              <img class="dw-avatar" src="${m.avatar_url}" alt="${m.username}" onerror="this.src='https://i.goopics.net/e7pop3.png'"/>
              <span class="dw-status-dot ${m.status}"></span>
            </div>
            <div>
              <div class="dw-member-name">${m.username}</div>
              ${m.game ? `<div class="dw-game"><svg viewBox="0 0 24 24" fill="#e6262b" width="10" height="10"><path d="M7 6h10a4 4 0 0 1 4 4v4a4 4 0 0 1-4 4 3 3 0 0 1-2.4-1.2L13 15h-2l-1.6 1.8A3 3 0 0 1 7 18a4 4 0 0 1-4-4v-4a4 4 0 0 1 4-4zm1.5 3v2h-2v2h2v2h2v-2h2v-2h-2V9h-2zm9 1a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm-2.5 2.5a1 1 0 1 0 0 2 1 1 0 0 0 0-2z"/></svg><span>${m.game.name}</span></div>` : ''}
            </div>
          </div>
        `).join('');
      } catch(e) {
        document.getElementById('dw-members').innerHTML = '<div class="dw-loading">Impossible de charger le widget</div>';
      }
    }
    loadWidget();
  })();
  </script>

<script>
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function createParticle() {
  return {
    x: Math.random() * W,
    y: Math.random() * H + H,
    size: Math.random() * 2 + 0.5,
    speed: Math.random() * 0.6 + 0.2,
    opacity: Math.random() * 0.5 + 0.1,
    flicker: Math.random() * 0.02,
  };
}

for (let i = 0; i < 60; i++) {
  const p = createParticle();
  p.y = Math.random() * H;
  particles.push(p);
}

function animParticles() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach((p, i) => {
    p.y -= p.speed;
    p.opacity += p.flicker * (Math.random() > 0.5 ? 1 : -1);
    p.opacity = Math.max(0.05, Math.min(0.6, p.opacity));
    if (p.y < -10) particles[i] = createParticle();

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(230, 50, 50, ${p.opacity})`;
    ctx.fill();
  });
  requestAnimationFrame(animParticles);
}
animParticles();

function openModal(i) {
  document.getElementById('modal-img').src = modalImgs[i].src;
  document.getElementById('modal-caption').textContent = modalImgs[i].caption;
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
}
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

(function() {
  const USER_ID = '357598028321914890';
  const STATUS_COLORS = { online: '#43b581', idle: '#faa61a', dnd: '#f04747', offline: '#747f8d' };
  const STATUS_LABELS = { online: '🟢', idle: '🌙', dnd: '⛔', offline: '💤' };

  function applyStatus(data) {
    const status = data.discord_status || 'offline';
    const color = STATUS_COLORS[status] || STATUS_COLORS.offline;
    const card = document.getElementById('discord-card');
    const statusEl = document.getElementById('dc-status');
    const activityEl = document.getElementById('dc-activity');
    const nameEl = document.getElementById('dc-name');
    const avatarEl = document.getElementById('dc-avatar');

    card.style.setProperty('--dc-color', color);
    statusEl.textContent = STATUS_LABELS[status] || '⚫ Hors ligne';

    if (data.discord_user) {
      const u = data.discord_user;
      nameEl.textContent = u.global_name || u.username || 'shiiou';
      if (u.avatar) {
        avatarEl.src = `https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.png?size=64`;
      } else {
        avatarEl.src = `https://cdn.discordapp.com/embed/avatars/0.png`;
      }

    }

    activityEl.innerHTML = '';
    if (data.spotify) {
      activityEl.innerHTML = `<img src="${data.spotify.album_art_url}" onerror="this.remove()"/><span>♪ ${data.spotify.song} — ${data.spotify.artist}</span>`;
    } else if (data.activities && data.activities.length > 0) {
      const act = data.activities.find(a => a.type !== 4) || data.activities[0];
      if (act && act.name) {
        const label = act.type === 4 && act.state ? act.state : act.name;
        let iconUrl = '';
        if (act.assets && act.assets.large_image && act.application_id) {
          const img = act.assets.large_image;
          iconUrl = img.startsWith('mp:') ?
            `https://media.discordapp.net/${img.replace('mp:', '')}` :
            `https://cdn.discordapp.com/app-assets/${act.application_id}/${img}.png`;
        }
        activityEl.innerHTML = (iconUrl ? `<img src="${iconUrl}" onerror="this.remove()"/>` : '') + `<span>${label}</span>`;
      }
    }
  }

  function connectWS() {
    const ws = new WebSocket('wss://api.lanyard.rest/socket');
    let heartbeat;
    ws.onopen = () => {
      ws.send(JSON.stringify({ op: 2, d: { subscribe_to_id: USER_ID } }));
    };
    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.op === 1) {
        heartbeat = setInterval(() => ws.send(JSON.stringify({ op: 3 })), msg.d.heartbeat_interval);
      }
      if (msg.op === 0 && (msg.t === 'INIT_STATE' || msg.t === 'PRESENCE_UPDATE')) {
        applyStatus(msg.d);
      }
    };
    ws.onclose = () => { clearInterval(heartbeat); setTimeout(connectWS, 5000); };
    ws.onerror = () => ws.close();
  }

  fetch(`https://api.lanyard.rest/v1/users/${USER_ID}`)
    .then(r => r.json())
    .then(j => { if (j.success) applyStatus(j.data); })
    .catch(() => {});

  connectWS();
})();

const PLAYLIST = [
  { type: 'mp3', src: 'musique.mp3', title: 'Prettiest Girl', artist: 'Tyler Watts' },
];

(function() {
  const bar       = document.getElementById('song-bar');
  const iconEl    = document.getElementById('song-icon');
  const titleEl   = document.getElementById('song-title');
  const artistEl  = document.getElementById('song-artist');
  const volSlider = document.getElementById('song-vol');

  let current = 0;
  let isPlaying = false;
  let ytPlayer = null;
  let ytReady = false;
  let audioEl = null;
  let startedOnce = false;

  function track() { return PLAYLIST[current]; }

  function updateInfo() {
    const t = track();
    if (!t) { titleEl.textContent = '—'; artistEl.textContent = 'No track configured'; return; }
    titleEl.textContent = t.title || 'Unknown title';
    artistEl.textContent = t.artist || '';
  }

  function setPlayingUI(playing) {
    isPlaying = playing;
    bar.classList.toggle('playing', playing);
    iconEl.textContent = playing ? '❚❚' : '▶';
  }

  // --- Moteur Audio natif (MP3) ---
  function getAudioEl() {
    if (!audioEl) {
      audioEl = new Audio();
      audioEl.volume = volSlider.value / 100;
      audioEl.addEventListener('ended', playNext);
    }
    return audioEl;
  }

  function playMp3(t) {
    if (ytPlayer && ytReady) { try { ytPlayer.stopVideo(); } catch(e){} }
    const a = getAudioEl();
    a.src = t.src;
    a.play().then(() => setPlayingUI(true)).catch(() => setPlayingUI(false));
  }

  function pauseMp3() {
    if (audioEl) audioEl.pause();
    setPlayingUI(false);
  }

  // --- Moteur YouTube (IFrame API, audio uniquement) ---
  function loadYouTubeAPI(cb) {
    if (window.YT && window.YT.Player) { cb(); return; }
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
    window.onYouTubeIframeAPIReady = cb;
  }

  function ensureYtPlayer(t, onReadyPlay) {
    if (ytPlayer && ytReady) {
      ytPlayer.loadVideoById(t.id);
      ytPlayer.setVolume(volSlider.value);
      if (onReadyPlay) setTimeout(() => ytPlayer.playVideo(), 200);
      return;
    }
    loadYouTubeAPI(() => {
      ytPlayer = new YT.Player('yt-player', {
        height: '0', width: '0', videoId: t.id,
        playerVars: { autoplay: 1, controls: 0, disablekb: 1, fs: 0, modestbranding: 1 },
        events: {
          onReady: (e) => {
            ytReady = true;
            e.target.setVolume(volSlider.value);
            if (onReadyPlay) e.target.playVideo();
          },
          onStateChange: (e) => {
            if (e.data === YT.PlayerState.PLAYING) setPlayingUI(true);
            if (e.data === YT.PlayerState.PAUSED) setPlayingUI(false);
            if (e.data === YT.PlayerState.ENDED) playNext();
          }
        }
      });
    });
  }

  function playYoutube(t) {
    if (audioEl) audioEl.pause();
    ensureYtPlayer(t, true);
  }

  function pauseYoutube() {
    if (ytPlayer && ytReady) ytPlayer.pauseVideo();
    setPlayingUI(false);
  }

  // --- Contrôle commun ---
  function playCurrent() {
    const t = track();
    if (!t) return;
    updateInfo();
    if (t.type === 'youtube') playYoutube(t);
    else playMp3(t);
  }

  function pauseCurrent() {
    const t = track();
    if (!t) return;
    if (t.type === 'youtube') pauseYoutube();
    else pauseMp3();
  }

  function playNext() {
    if (PLAYLIST.length === 0) return;
    current = (current + 1) % PLAYLIST.length;
    playCurrent();
  }

  function togglePlay() {
    if (PLAYLIST.length === 0) return;
    if (isPlaying) pauseCurrent();
    else playCurrent();
  }

  // Volume
  volSlider.addEventListener('input', () => {
    const v = volSlider.value;
    if (audioEl) audioEl.volume = v / 100;
    if (ytPlayer && ytReady) ytPlayer.setVolume(v);
  });

  bar.addEventListener('click', (e) => {
    if (e.target === volSlider) return;
    startedOnce = true;
    togglePlay();
  });

  updateInfo();

  function firstInteractionPlay() {
    if (startedOnce) return;
    startedOnce = true;
    playCurrent();
    document.removeEventListener('click', firstInteractionPlay);
    document.removeEventListener('touchstart', firstInteractionPlay);
    document.removeEventListener('keydown', firstInteractionPlay);
  }
  document.addEventListener('click', firstInteractionPlay);
  document.addEventListener('touchstart', firstInteractionPlay);
  document.addEventListener('keydown', firstInteractionPlay);
})();

(function() {
  document.addEventListener('contextmenu', e => e.preventDefault());

  document.addEventListener('keydown', e => {
    const k = e.key;
    const blocked =
      k === 'F12' ||
      (e.ctrlKey && e.shiftKey && (k === 'I' || k === 'i' || k === 'J' || k === 'j' || k === 'C' || k === 'c')) ||
      (e.ctrlKey && (k === 'U' || k === 'u')) ||
      (e.metaKey && e.altKey && (k === 'I' || k === 'i' || k === 'J' || k === 'j' || k === 'C' || k === 'c'));
    if (blocked) e.preventDefault();
  });
})();

</script>
